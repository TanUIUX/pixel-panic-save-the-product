<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a12" />
<title>PIXEL PANIC — Save the Product</title>
<style>
:root{
  --bg:#08080f; --bg2:#0e1020; --navy:#141633; --panel:#161832; --panel2:#1e2145;
  --violet:#8a5cff; --violet2:#b18cff; --cyan:#38e6ff; --green:#46e089; --amber:#ffb454;
  --coral:#ff5d6c; --magenta:#ff5df0; --white:#f4f5ff; --gray:#a6a8c8; --gray2:#6d6f92;
  --border:#2a2d55; --border2:#3a3e73;
  --good:#46e089; --bad:#ff5d6c; --radius:12px;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:'SFMono-Regular',Menlo,Consolas,'Liberation Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--bg); color:var(--white);
  overflow:hidden; -webkit-font-smoothing:antialiased; user-select:none;
  touch-action:manipulation;
}
body.reduced-motion *{animation-duration:0.001s!important; transition-duration:0.001s!important}
#app{position:fixed; inset:0; display:flex; flex-direction:column}
#scene-canvas{position:absolute; inset:0; width:100%; height:100%; z-index:0}
#overlay{position:absolute; inset:0; z-index:1; display:flex; flex-direction:column; overflow:hidden}
.screen{position:absolute; inset:0; display:none; flex-direction:column; overflow:auto; -webkit-overflow-scrolling:touch}
.screen.active{display:flex}
.center{align-items:center; justify-content:center}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
button:focus-visible,[tabindex]:focus-visible,.obj:focus-visible{outline:3px solid var(--cyan); outline-offset:2px}
.wrap{width:100%; max-width:1120px; margin:0 auto; padding:24px}

/* Buttons */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
  min-height:44px; padding:12px 22px; border-radius:var(--radius); font-weight:700;
  font-size:15px; letter-spacing:.3px; border:1px solid var(--border2);
  background:linear-gradient(180deg,var(--panel2),var(--panel)); color:var(--white);
  transition:transform .12s ease, box-shadow .2s ease, border-color .2s ease}
.btn:hover{transform:translateY(-1px); border-color:var(--violet)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(180deg,var(--violet),#6a3ce0); border-color:var(--violet2);
  box-shadow:0 6px 22px rgba(138,92,255,.35)}
.btn.primary:hover{box-shadow:0 8px 30px rgba(138,92,255,.5)}
.btn.ghost{background:rgba(255,255,255,.03)}
.btn.wide{width:100%}
.btn.sm{min-height:36px; padding:8px 14px; font-size:13px}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none}
.btn.cyan{background:linear-gradient(180deg,#1b7f95,#125a6b); border-color:var(--cyan)}
.btn.danger{border-color:var(--coral)}

.tag{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.6px; padding:4px 10px; border-radius:999px;
  border:1px solid var(--border2); color:var(--gray)}
.tag.violet{color:var(--violet2); border-color:var(--violet)}
.tag.cyan{color:var(--cyan); border-color:#2b6c7d}
.tag.green{color:var(--green); border-color:#2a6b47}
.tag.amber{color:var(--amber); border-color:#7a5a2a}
.tag.coral{color:var(--coral); border-color:#7a2f38}

.mono{font-family:var(--mono)}
.muted{color:var(--gray)}
.dim{color:var(--gray2)}
h1,h2,h3{line-height:1.15}
.logo-title{font-weight:900; letter-spacing:2px}
.card{background:linear-gradient(180deg,rgba(30,33,69,.85),rgba(20,22,45,.85));
  border:1px solid var(--border); border-radius:16px; padding:20px; backdrop-filter:blur(8px)}
.panel-glass{background:rgba(12,14,30,.72); border:1px solid var(--border); backdrop-filter:blur(10px)}

/* Boot */
#boot .bootbox{text-align:center; padding:24px}
#boot .barwrap{width:min(360px,70vw); height:6px; border-radius:99px; background:var(--panel); overflow:hidden; margin:22px auto 0; border:1px solid var(--border)}
#boot .bar{height:100%; width:0%; background:linear-gradient(90deg,var(--cyan),var(--violet)); transition:width .2s}

/* Main menu */
.menu-list{display:flex; flex-direction:column; gap:10px; width:min(340px,86vw)}
.brandwrap{text-align:center; margin-bottom:26px}
.brandwrap .sub{color:var(--cyan); letter-spacing:6px; font-size:12px; font-weight:700; margin-top:8px}

/* HUD */
#hud{position:absolute; inset:0; pointer-events:none; z-index:2; display:none; flex-direction:column}
#hud.active{display:flex}
.hud-top{pointer-events:auto; display:flex; gap:12px; align-items:stretch; padding:12px; flex-wrap:wrap;
  background:linear-gradient(180deg,rgba(8,8,15,.9),rgba(8,8,15,0))}
.hud-cell{background:rgba(14,16,30,.8); border:1px solid var(--border); border-radius:12px; padding:8px 12px; min-width:0}
.hud-cell .lbl{font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--gray2)}
.hud-cell .val{font-weight:800; font-size:16px; font-family:var(--mono)}
.meter{height:7px; border-radius:99px; background:#000; overflow:hidden; border:1px solid var(--border); margin-top:5px; width:120px; max-width:34vw}
.meter > span{display:block; height:100%; transition:width .3s ease}
.grow{flex:1; min-width:80px}
.hud-mid{flex:1; pointer-events:none}
.toolbelt{pointer-events:auto; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  padding:12px; background:linear-gradient(0deg,rgba(8,8,15,.92),rgba(8,8,15,0))}
.tool{display:flex; flex-direction:column; align-items:center; gap:3px; min-width:56px; min-height:56px;
  padding:8px 6px; border-radius:12px; border:1px solid var(--border); background:rgba(20,22,45,.85); color:var(--gray)}
.tool .ic{font-size:18px}
.tool .nm{font-size:9px; text-transform:uppercase; letter-spacing:.5px}
.tool:hover{border-color:var(--violet); color:var(--white)}
.tool.on{border-color:var(--cyan); color:var(--cyan)}
.tool:disabled{opacity:.35}

/* Game stage (mechanic area) */
#stage-host{position:absolute; left:0; right:0; top:96px; bottom:96px; z-index:2; pointer-events:none;
  display:flex; align-items:center; justify-content:center; padding:8px}
.stage{pointer-events:auto; width:min(940px,96vw); max-height:100%; overflow:auto;
  background:rgba(11,13,28,.82); border:1px solid var(--border); border-radius:16px; padding:18px; backdrop-filter:blur(8px)}
.stage h3{font-size:17px; margin-bottom:2px}
.stage .instr{color:var(--gray); font-size:13px; margin-bottom:14px}
.roundbadge{font-size:11px; color:var(--cyan); font-weight:700; letter-spacing:1px; text-transform:uppercase}

/* object grid for spot-issue / product interface */
.product{display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.obj{position:relative; text-align:left; padding:12px; border-radius:12px; border:1px solid var(--border);
  background:linear-gradient(180deg,rgba(30,33,69,.7),rgba(18,20,42,.7)); min-height:56px; color:var(--white)}
.obj .t{font-weight:700; font-size:14px}
.obj .d{font-size:11px; color:var(--gray); margin-top:3px}
.obj.flagged{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber) inset}
.obj.correct{border-color:var(--green); box-shadow:0 0 0 1px var(--green) inset}
.obj.wrong{border-color:var(--coral); box-shadow:0 0 0 1px var(--coral) inset}
.obj .mark{position:absolute; top:6px; right:8px; font-size:13px}
.obj.issuehint::after{content:''; position:absolute; top:8px; right:8px; width:8px; height:8px; border-radius:99px; background:var(--coral); box-shadow:0 0 10px var(--coral)}

.opts{display:flex; flex-direction:column; gap:10px}
.opt{text-align:left; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
  background:rgba(255,255,255,.02); color:var(--white); font-size:14px}
.opt:hover{border-color:var(--violet)}
.opt.sel{border-color:var(--cyan)}
.opt.good{border-color:var(--green); background:rgba(70,224,137,.08)}
.opt.bad{border-color:var(--coral); background:rgba(255,93,108,.08)}

/* buckets (drag-sort) */
.bucketwrap{display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-bottom:14px}
.bucket{border:1px dashed var(--border2); border-radius:12px; padding:10px; min-height:70px; background:rgba(255,255,255,.02)}
.bucket h4{font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--cyan); margin-bottom:8px}
.bucket.over{border-color:var(--cyan); background:rgba(56,230,255,.06)}
.chip{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 11px; border-radius:10px;
  border:1px solid var(--border); background:linear-gradient(180deg,rgba(30,33,69,.8),rgba(18,20,42,.8)); margin-bottom:8px; font-size:13px}
.chip .kbd{display:flex; gap:4px}
.chip .kbd button{font-size:11px; border:1px solid var(--border2); border-radius:6px; padding:2px 6px; color:var(--gray)}
.chip .kbd button:hover{color:var(--cyan); border-color:var(--cyan)}
.chip.dragging{opacity:.5}
.pool{min-height:40px}

/* flow ordering */
.flowlist{display:flex; flex-direction:column; gap:8px}
.flowitem{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; border:1px solid var(--border);
  background:rgba(30,33,69,.6); font-size:13px}
.flowitem .num{width:24px; height:24px; border-radius:99px; background:var(--violet); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; flex-shrink:0}
.flowitem .grip{margin-left:auto; display:flex; gap:4px}
.flowitem.remove{opacity:.5; text-decoration:line-through}

/* contrast */
.contrast-preview{border-radius:12px; padding:26px; text-align:center; font-weight:800; font-size:22px; margin-bottom:14px; border:1px solid var(--border)}
.slider-row{display:flex; align-items:center; gap:12px; margin:10px 0}
.slider-row label{width:130px; font-size:13px; color:var(--gray)}
input[type=range]{flex:1; accent-color:var(--violet); height:28px}
.ratio{font-family:var(--mono); font-weight:800; font-size:20px}

/* dialogue */
.dlg-portraitbar{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap}
.dlg-line{background:rgba(20,22,45,.9); border:1px solid var(--border); border-left:3px solid var(--violet);
  border-radius:10px; padding:12px 14px; margin-bottom:12px}
.dlg-line .who{font-weight:800; font-size:12px; color:var(--violet2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px}
.dlg-line .txt{font-size:14px; line-height:1.5}
.meters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px}
.meterbox{flex:1; min-width:110px; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:10px; padding:8px 10px}
.meterbox .lbl{font-size:9px; text-transform:uppercase; letter-spacing:.7px; color:var(--gray2)}
.meterbox .num{font-family:var(--mono); font-weight:800; font-size:15px}

/* capacity */
.cap-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-weight:800}
.feat{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; background:rgba(255,255,255,.02); font-size:13px}
.feat.sel{border-color:var(--cyan); background:rgba(56,230,255,.06)}
.feat .cost{margin-left:auto; font-family:var(--mono); font-weight:800; color:var(--amber)}
.feat .flag{font-size:10px; padding:2px 6px; border-radius:6px; border:1px solid var(--border2); color:var(--gray)}

/* mission map */
.map-grid{display:grid; gap:16px; grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.district{position:relative; border-radius:16px; overflow:hidden; border:1px solid var(--border); min-height:180px;
  padding:16px; display:flex; flex-direction:column; justify-content:flex-end; color:#fff}
.district .top{position:absolute; top:12px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:flex-start}
.district h3{font-size:17px; position:relative; z-index:2}
.district .meta{font-size:12px; color:var(--gray); position:relative; z-index:2; margin-top:2px}
.district .status{position:relative; z-index:2; margin-top:10px}
.district.locked{opacity:.6; filter:grayscale(.5)}
.district .bg{position:absolute; inset:0; z-index:0}
.district .boss-icon{position:absolute; top:10px; right:12px; z-index:2; font-size:22px}

/* results */
.grade-stamp{font-size:84px; font-weight:900; line-height:1; text-align:center}
.result-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px}
.result-row .v{font-family:var(--mono); font-weight:800}
.beforeafter{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:14px 0}
.ba{border:1px solid var(--border); border-radius:12px; padding:12px; font-size:13px}
.ba.before{border-color:#7a2f38}
.ba.after{border-color:#2a6b47}

/* portraits (character art via CSS) */
.portrait{width:52px; height:52px; border-radius:12px; position:relative; overflow:hidden; flex-shrink:0; border:1px solid var(--border2); background:var(--navy)}
.portrait.lg{width:96px; height:110px; border-radius:14px}
.portrait .face{position:absolute; inset:0}
.namechip{display:inline-flex; align-items:center; gap:8px; padding:5px 10px 5px 5px; border-radius:99px; background:rgba(255,255,255,.04); border:1px solid var(--border); font-size:12px; font-weight:700}
.namechip .portrait{width:30px; height:30px; border-radius:99px}

/* dialogue bottom bar in gameplay */
#dialogbar{position:absolute; left:0; right:0; bottom:96px; z-index:4; display:none; padding:0 12px; pointer-events:none}
#dialogbar.active{display:block}
.dbar-inner{pointer-events:auto; max-width:760px; margin:0 auto; background:rgba(12,14,30,.96); border:1px solid var(--border2);
  border-radius:14px; padding:14px; display:flex; gap:12px; align-items:flex-start; box-shadow:0 10px 40px rgba(0,0,0,.5)}

/* modal */
.modal-back{position:absolute; inset:0; z-index:20; background:rgba(4,4,10,.72); display:none; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(3px)}
.modal-back.active{display:flex}
.modal{width:min(460px,94vw); max-height:92vh; overflow:auto}

/* patch bubble */
#patch-bubble{position:absolute; right:14px; bottom:170px; z-index:5; max-width:250px; display:none; pointer-events:none}
#patch-bubble.active{display:block}
.patch-inner{display:flex; gap:8px; align-items:flex-start; background:rgba(12,14,30,.95); border:1px solid var(--cyan); border-radius:12px; padding:10px 12px; font-size:12px; box-shadow:0 6px 24px rgba(56,230,255,.2)}
.patch-drone{width:30px; height:30px; flex-shrink:0; border-radius:8px; background:radial-gradient(circle at 50% 40%,var(--cyan),#0a6b7d); position:relative}
.patch-drone::after{content:''; position:absolute; top:11px; left:11px; width:8px; height:8px; border-radius:99px; background:#fff}

.toast{position:absolute; top:70px; left:50%; transform:translateX(-50%); z-index:30; background:rgba(12,14,30,.96);
  border:1px solid var(--violet); border-radius:12px; padding:10px 16px; font-weight:700; font-size:13px; display:none; box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.active{display:block; animation:pop .3s ease}
@keyframes pop{from{transform:translateX(-50%) translateY(-8px); opacity:0} to{transform:translateX(-50%) translateY(0); opacity:1}}

.rowflex{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
.spread{display:flex; justify-content:space-between; align-items:center; gap:10px}
.divider{height:1px; background:var(--border); margin:14px 0}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.avatar-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:min(560px,92vw)}
.avatar-pick{border:1px solid var(--border); border-radius:14px; padding:12px; text-align:center; background:rgba(255,255,255,.02)}
.avatar-pick.sel{border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan) inset}
.avatar-pick .portrait{margin:0 auto 8px; width:70px; height:80px}
.field{width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--border2); background:rgba(0,0,0,.3); color:#fff; font-size:14px; font-family:inherit}
.field:focus{outline:none; border-color:var(--cyan)}
.seg{display:flex; gap:8px; flex-wrap:wrap}
.seg .btn{flex:1}
.seg .btn.on{border-color:var(--cyan); color:var(--cyan)}
label.flabel{font-size:12px; color:var(--gray); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px}
.sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0)}
.hint-help{font-size:12px; color:var(--amber); margin-top:10px; display:none}
.hint-help.active{display:block}
.feedback{font-size:13px; margin-top:10px; padding:10px 12px; border-radius:10px; display:none}
.feedback.active{display:block}
.feedback.good{background:rgba(70,224,137,.1); border:1px solid #2a6b47; color:var(--green)}
.feedback.bad{background:rgba(255,93,108,.1); border:1px solid #7a2f38; color:var(--coral)}

@media (max-width:620px){
  .hud-top{gap:8px; padding:8px}
  .hud-cell{padding:6px 9px}
  .hud-cell .val{font-size:14px}
  .meter{width:80px}
  .avatar-grid{grid-template-columns:repeat(2,1fr)}
  .grid2,.beforeafter{grid-template-columns:1fr}
  #stage-host{top:120px; bottom:88px}
  .grade-stamp{font-size:60px}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="scene-canvas"></canvas>
  <div id="overlay"></div>
  <div id="hud"></div>
  <div id="stage-host"><div class="stage" id="stage" role="region" aria-label="Khu vực chơi"></div></div>
  <div id="dialogbar"><div class="dbar-inner" id="dbar-inner"></div></div>
  <div id="patch-bubble"><div class="patch-inner"><div class="patch-drone"></div><div id="patch-text"></div></div></div>
  <div class="toast" id="toast"></div>
  <div class="modal-back" id="modal-back"><div class="card modal" id="modal"></div></div>
</div>
<script src="game.js"></script>
</body>
</html>
